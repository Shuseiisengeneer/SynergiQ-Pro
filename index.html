/* ===================== METRICS ===================== */
const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));

const makeMetrics = () => ({
  confidence: +(70 + Math.random() * 29.9).toFixed(1),
  synergy: Math.round(40 + Math.random() * 59),
  roi: +(1.5 + Math.random() * 8.4).toFixed(1),
  potential: Math.round(50 + Math.random() * 49),
  align: Math.round(60 + Math.random() * 39)
});

const driftMetrics = (m) => ({
  confidence: +clamp(m.confidence + (Math.random() - 0.5) * 1.0, 70, 99.9).toFixed(1),
  synergy: Math.round(clamp(m.synergy + (Math.random() - 0.5) * 4, 40, 99)),
  roi: +clamp(m.roi + (Math.random() - 0.5) * 0.4, 1.5, 9.9).toFixed(1),
  potential: Math.round(clamp(m.potential + (Math.random() - 0.5) * 4, 50, 99)),
  align: Math.round(clamp(m.align + (Math.random() - 0.5) * 2, 60, 99))
});

const makeSpark = () => {
  const a = [];
  let v = 30 + Math.random() * 25;
  for (let i = 0; i < 24; i++) {
    v = clamp(v + (Math.random() - 0.5) * 14, 8, 85);
    a.push(+v.toFixed(1));
  }
  return a;
};
const stepSpark = (arr) => {
  const last = arr[arr.length - 1];
  const delta = (Math.random() < 0.5 ? -1 : 1) * (5 + Math.random() * 3);
  const next = +clamp(last + delta, 8, 85).toFixed(1);
  return [...arr.slice(1), next];
};

/* ===================== SPARKLINE ===================== */
const Sparkline = ({ data, color }) => {
  const W = 100, H = 56, pad = 4;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = pad + (i / (data.length - 1)) * (W - pad * 2);
    const y = pad + (1 - (v - min) / range) * (H - pad * 2);
    return [x, y];
  });
  const line = pts.map((p, i) => `${i === 0 ? "M" : "L"}${p[0].toFixed(2)},${p[1].toFixed(2)}`).join(" ");
  const area = `${line} L${pts[pts.length - 1][0].toFixed(2)},${H} L${pts[0][0].toFixed(2)},${H} Z`;
  const lastP = pts[pts.length - 1];
  const gid = "g" + color.replace("#", "");
  return (
    <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ display: "block" }}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.32" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#${gid})`} />
      <path d={line} fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke" />
      <circle cx={lastP[0]} cy={lastP[1]} r="2.6" fill={color} />
    </svg>
  );
};

  const showToast = useCallback((msg) => {
    setToast(msg);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 1800);
  }, []);

  /* drift metrics + sparklines every 1.4s */
  useEffect(() => {
    const id = setInterval(() => {
      setMetrics((m) => driftMetrics(m));
      setSparks((s) => s.map(stepSpark));
    }, 1400);
    return () => clearInterval(id);
  }, []);

  /* speech */
  const speak = useCallback((text) => {
    if (!("speechSynthesis" in window)) return;
    try {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "ja-JP";
      u.rate = 1.0;
      u.pitch = 1.0;
      const voices = speechSynthesis.getVoices();
      const jp = voices.find((v) => v.lang === "ja-JP" || v.lang.startsWith("ja"));
      if (jp) u.voice = jp;
      speechSynthesis.speak(u);
    } catch (e) { /* noop */ }
  }, []);

  useEffect(() => {
    if ("speechSynthesis" in window) {
      const warm = () => speechSynthesis.getVoices();
      warm();
      speechSynthesis.onvoiceschanged = warm;
    }
  }, []);

  /* generate */
  const generate = useCallback(() => {
    if (loading) return;
    setLoading(true);
    setStarred(false);

    const steps = [...LOADING_STEPS].sort(() => Math.random() - 0.5).slice(0, 3);
    setLoadStep(steps[0]);
    setLoadStepKey((k) => k + 1);

    loadTimers.current.forEach(clearTimeout);
    loadTimers.current = [];
    loadTimers.current.push(setTimeout(() => {
      setLoadStep(steps[1]); setLoadStepKey((k) => k + 1);
    }, 320));
    loadTimers.current.push(setTimeout(() => {
      setLoadStep(steps[2]); setLoadStepKey((k) => k + 1);
    }, 640));

    const wait = 900 + Math.random() * 600;
    loadTimers.current.push(setTimeout(() => {
      const next = genPhrase();
      setPhrase((prev) => {
        setHistory((h) => [
          { id: Date.now(), text: prev, confidence: metrics.confidence },
          ...h
        ].slice(0, 12));
        return prev;
      });
      setPhrase(next);
      setPhraseKey((k) => k + 1);
      setMetrics(makeMetrics());
      setLoading(false);
      if (voiceOn) speak(next);
    }, wait));
  }, [loading, metrics.confidence, voiceOn, speak]);

  useEffect(() => () => {
    loadTimers.current.forEach(clearTimeout);
    if (toastTimer.current) clearTimeout(toastTimer.current);
  }, []);

  const copyPhrase = useCallback(() => {
    const write = navigator.clipboard && navigator.clipboard.writeText
      ? navigator.clipboard.writeText(phrase)
      : Promise.reject();
    write.then(() => showToast("クリップボードに保存しました"))
      .catch(() => {
        try {
          const ta = document.createElement("textarea");
          ta.value = phrase;
          ta.style.position = "fixed"; ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
          showToast("クリップボードに保存しました");
        } catch (e) {
          showToast("コピーに失敗しました");
        }
      });
  }, [phrase, showToast]);

  const toggleStar = useCallback(() => {
    setStarred((s) => {
      const ns = !s;
      showToast(ns ? "提言をスターに追加しました" : "スターを解除しました");
      return ns;
    });
  }, [showToast]);

  const tickerItems = [...TICKER, ...TICKER];

  return (
    <div className="min-h-screen flex flex-col">
      {/* HEADER */}
      <header className="sticky top-0 z-40" style={{
        background: "rgba(10,14,26,0.82)",
        backdropFilter: "blur(12px)",
        WebkitBackdropFilter: "blur(12px)",
        borderBottom: "1px solid var(--border)"
      }}>
        <div className="max-w-6xl mx-auto px-4 md:px-6 h-16 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="font-mono font-bold flex items-center justify-center"
              style={{ width: 32, height: 32, borderRadius: 8, background: "var(--cyan)", color: "var(--bg)", fontSize: 18 }}>
              Q
            </div>
            <div className="leading-tight">
              <div className="font-semibold" style={{ fontSize: 16 }}>
                SynergiQ<sup style={{ fontSize: 9, top: "-0.7em" }}>™</sup> <span style={{ color: "var(--cyan)" }}>Pro</span>
              </div>
              <div className="font-mono" style={{ fontSize: 9, letterSpacing: "0.18em", color: "var(--text-3)", textTransform: "uppercase" }}>
                Enterprise Strategy AI · v2.4.1
              </div>
            </div>
          </div>
          <div className="flex items-center gap-3 md:gap-4">
            <div className="hidden md:flex items-center gap-2 px-2.5 py-1 rounded-md"
              style={{ background: "var(--bg-elev)", border: "1px solid var(--border)" }}>
              <span className="blink-led" style={{ width: 7, height: 7, borderRadius: "50%", background: "var(--green)" }}></span>
              <span className="font-mono" style={{ fontSize: 10, letterSpacing: "0.14em", color: "var(--text-2)" }}>SYSTEM ONLINE</span>
            </div>
            <div className="hidden sm:block text-right leading-tight">
              <div style={{ fontSize: 13, fontWeight: 500 }}>山田 太郎</div>
              <div style={{ fontSize: 10, color: "var(--text-3)" }}>Strategy Director</div>
            </div>
            <div className="flex items-center justify-center font-mono font-semibold"
              style={{ width: 34, height: 34, borderRadius: "50%", background: "var(--bg-elev)", border: "1px solid var(--border)", fontSize: 12, color: "var(--text-2)" }}>
              YT
            </div>
          </div>
        </div>
        {/* TICKER */}
        <div style={{ borderTop: "1px solid var(--border-soft)", background: "var(--bg-card)", overflow: "hidden" }}>
          <div className="py-1.5 whitespace-nowrap flex ticker" style={{ width: "max-content" }}>
            {tickerItems.map((t, i) => {
              const up = t.includes("▲");
              const [head, ...rest] = t.split(up ? "▲" : "▼");
              return (
                <span key={i} className="font-mono" style={{ fontSize: 11, color: "var(--text-2)", paddingLeft: 24, paddingRight: 24 }}>
                  {head}
                  <span style={{ color: up ? "var(--green)" : "var(--red)" }}>{up ? "▲" : "▼"}{rest.join("")}</span>
                </span>
              );
            })}
          </div>
        </div>
      </header>

      <main className="max-w-6xl mx-auto w-full px-4 md:px-6 py-5 flex-1">
        {/* MODE TABS */}
        <div className="flex flex-wrap gap-2 mb-5">
          {MODES.map((m, i) => (
            <button key={m} onClick={() => setActiveMode(i)}
              className="tab-btn font-mono px-3 py-1.5 rounded-md"
              style={{
                fontSize: 12,
                letterSpacing: "0.04em",
                background: activeMode === i ? "var(--bg-elev)" : "transparent",
                border: `1px solid ${activeMode === i ? "var(--border)" : "transparent"}`,
                color: activeMode === i ? "var(--text)" : "var(--text-3)"
              }}>
              {m}
            </button>
          ))}
        </div>

        <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
          {/* MAIN CARD */}
          <section className="md:col-span-2 card flex flex-col">
            <div className="flex items-center justify-between px-5 pt-4 pb-3" style={{ borderBottom: "1px solid var(--border-soft)" }}>
              <div className="flex items-center gap-2">
                <span style={{ color: "var(--cyan)" }}><Icon name="Target" size={15} /></span>
                <span className="font-mono" style={{ fontSize: 11, letterSpacing: "0.16em", color: "var(--text-2)", textTransform: "uppercase" }}>
                  本日の戦略提言
                </span>
              </div>
              <div className="flex items-center gap-2">
                <span className="font-mono" style={{ fontSize: 11, color: "var(--text-3)" }}>{MODES[activeMode]}</span>
                <span className="pulse-dot" style={{ width: 6, height: 6, borderRadius: "50%", background: "var(--cyan)" }}></span>
              </div>
            </div>

            {/* PHRASE AREA */}
            <div className="px-5 md:px-7 flex items-center justify-center text-center"
              style={{ minHeight: 140 }}>
              {loading ? (
                <div className="scan-line w-full flex flex-col items-center justify-center gap-3 py-6">
                  <Icon name="RefreshCw" size={22} className="spin" />
                  <span key={loadStepKey} className="marquee-text font-mono"
                    style={{ fontSize: 13, color: "var(--cyan)", letterSpacing: "0.04em" }}>
                    {loadStep}…
                  </span>
                </div>
              ) : (
                <p key={phraseKey} className="phrase-enter text-lg md:text-2xl leading-relaxed font-medium"
                  style={{ color: "var(--text)" }}>
                  {phrase}
                </p>
              )}
            </div>

            {/* METRICS */}
            <div className="grid grid-cols-5" style={{ borderTop: "1px solid var(--border-soft)" }}>
              <MetricCell label="信頼度" value={`${metrics.confidence.toFixed(1)}%`} color="var(--green)" />
              <MetricCell label="シナジー指数" value={metrics.synergy} color="var(--cyan)" />
              <MetricCell label="ROI予測" value={`${metrics.roi.toFixed(1)}x`} color="var(--amber)" />
              <MetricCell label="市場ポテンシャル" value={metrics.potential} color="var(--cyan)" />
              <MetricCell label="組織アライン度" value={`${metrics.align}%`} color="var(--green)" />
            </div>

            {/* ACTIONS */}
            <div className="px-5 py-4 flex flex-wrap items-center gap-2.5" style={{ borderTop: "1px solid var(--border-soft)" }}>
              <button onClick={generate} disabled={loading}
                className="cta-glow font-medium rounded-lg px-4 py-2.5 flex items-center gap-2"
                style={{ color: "var(--bg)", fontSize: 14 }}>
                <Icon name="RefreshCw" size={16} className={loading ? "spin" : ""} />
                {loading ? "分析中…" : "次の提言を生成"}
              </button>
              <button onClick={copyPhrase}
                className="icon-btn rounded-lg px-3 py-2.5 flex items-center gap-1.5"
                style={{ background: "var(--bg-elev)", border: "1px solid var(--border)", color: "var(--text-2)", fontSize: 13 }}>
                <Icon name="Copy" size={15} /> コピー
              </button>
              <button onClick={() => speak(phrase)}
                className="icon-btn rounded-lg px-3 py-2.5 flex items-center gap-1.5"
                style={{ background: "var(--bg-elev)", border: "1px solid var(--border)", color: "var(--text-2)", fontSize: 13 }}>
                <Icon name="Volume2" size={15} /> 読み上げ
              </button>
              <button onClick={toggleStar}
                className="icon-btn rounded-lg px-3 py-2.5 flex items-center gap-1.5"
                style={{
                  background: starred ? "rgba(245,158,11,0.12)" : "var(--bg-elev)",
                  border: `1px solid ${starred ? "rgba(245,158,11,0.5)" : "var(--border)"}`,
                  color: starred ? "var(--amber)" : "var(--text-2)",
                  fontSize: 13
                }}>
                <Icon name="Star" size={15} starActive={starred} /> スター
              </button>
              <label className="ml-auto flex items-center gap-2 cursor-pointer select-none"
                style={{ fontSize: 12, color: "var(--text-3)" }}>
                <input type="checkbox" checked={voiceOn} onChange={(e) => setVoiceOn(e.target.checked)}
                  style={{ accentColor: "#06B6D4", width: 14, height: 14 }} />
                生成時に自動読み上げ
              </label>
            </div>
          </section>

          {/* SIDE PANEL */}
          <aside className="flex flex-col gap-5">
            <ChartCard title="戦略偏差" icon="Activity" change="12.4%" positive={true} color="#06B6D4" data={sparks[0]} />
            <ChartCard title="競合優位性指数" icon="TrendingUp" change="3.8%" positive={true} color="#22C55E" data={sparks[1]} />
            <ChartCard title="エンゲージメント" icon="BarChart" change="0.6%" positive={false} color="#F59E0B" data={sparks[2]} />
          </aside>
        </div>

        {/* HISTORY */}
        <section className="card mt-5 p-5">
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-2">
              <span style={{ color: "var(--text-3)" }}><Icon name="Layers" size={15} /></span>
              <span className="font-mono" style={{ fontSize: 11, letterSpacing: "0.16em", color: "var(--text-2)", textTransform: "uppercase" }}>
                提言履歴
              </span>
            </div>
            <span className="font-mono" style={{ fontSize: 11, color: "var(--text-3)" }}>
              直近 {history.length} 件
            </span>
          </div>
          {history.length === 0 ? (
            <div className="text-center py-8" style={{ color: "var(--text-3)", fontSize: 13 }}>
              履歴はまだありません
            </div>
          ) : (
            <div className="flex flex-col">
              {history.map((h, i) => (
                <div key={h.id} className="hist-row flex items-center gap-3 px-2 py-2.5 rounded-md"
                  style={{ borderBottom: i === history.length - 1 ? "none" : "1px solid var(--border-soft)" }}>
                  <span className="font-mono shrink-0" style={{ fontSize: 11, color: "var(--text-3)" }}>
                    #{String(history.length - i).padStart(3, "0")}
                  </span>
                  <span className="flex-1 min-w-0 truncate" style={{ fontSize: 13, color: "var(--text-2)" }}>
                    {h.text}
                  </span>
                  <span className="font-mono shrink-0" style={{ fontSize: 11, color: "var(--green)" }}>
                    {h.confidence.toFixed(1)}%
                  </span>
                </div>
              ))}
            </div>
          )}
        </section>
      </main>

      {/* FOOTER */}
      <footer style={{ borderTop: "1px solid var(--border)" }}>
        <div className="max-w-6xl mx-auto px-4 md:px-6 py-3 flex flex-col sm:flex-row gap-1.5 sm:gap-4 sm:items-center sm:justify-between">
          <span className="font-mono" style={{ fontSize: 10, letterSpacing: "0.12em", color: "var(--text-3)", textTransform: "uppercase" }}>
            © SynergiQ Holdings, Inc. · ISO 27001 Certified · SOC 2 Type II
          </span>
          <span className="font-mono" style={{ fontSize: 10, letterSpacing: "0.12em", color: "var(--text-3)", textTransform: "uppercase" }}>
            BUILD 2.4.1+0520 / REGION: AP-NORTHEAST-1 / <span style={{ color: "var(--green)" }}>● ALL SYSTEMS OPERATIONAL</span>
          </span>
        </div>
      </footer>

      {/* TOAST */}
      {toast && (
        <div className="fixed left-1/2 z-50 phrase-enter"
          style={{
            bottom: 28, transform: "translateX(-50%)",
            background: "var(--bg-elev)", border: "1px solid var(--cyan)",
            borderRadius: 8, padding: "10px 18px",
            boxShadow: "0 0 18px rgba(6,182,212,0.3)"
          }}>
          <span className="font-mono" style={{ fontSize: 12, color: "#fff" }}>{toast}</span>
        </div>
      )}
    </div>
  );
}

/* ===================== MOUNT ===================== */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

requestAnimationFrame(() => {
  setTimeout(() => {
    const boot = document.getElementById("boot");
    if (boot) {
      boot.classList.add("hide");
      setTimeout(() => boot.remove(), 480);
    }
  }, 700);
});
</script>
</body>
</html>
